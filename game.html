<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flakse Fugl</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #e84c2b; --accent2: #f5c842; }
    html, body {
      width: 100%; height: 100%; background: #0a0a18;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; overflow: hidden; user-select: none;
    }
    #layout { display: flex; align-items: flex-start; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    #game-wrap { position: relative; flex-shrink: 0; }
    canvas {
      display: block; width: 360px; max-width: 98vw;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 1px var(--accent2), 8px 8px 0 var(--accent2);
    }
    #ui { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
    #score-display {
      margin-top: 18px; font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem; color: white; text-shadow: 3px 3px 0 var(--accent);
      letter-spacing: 0.05em; line-height: 1;
    }
    .screen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(10,10,20,0.85); padding: 2rem; pointer-events: all;
    }
    .screen.hidden { display: none; }
    .screen-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem,10vw,3.5rem);
      color: var(--accent2); text-shadow: 3px 3px 0 var(--accent);
      letter-spacing: 0.04em; text-align: center; line-height: 1; margin-bottom: 0.3rem;
    }
    .screen-sub {
      font-size: 0.75rem; color: rgba(255,255,255,0.4);
      letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1.5rem; text-align: center;
    }
    .btn {
      background: var(--accent); color: white; border: none; padding: 0.75rem 2rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 4px 4px 0 var(--accent2); margin-bottom: 0.6rem; width: 200px; text-align: center;
    }
    .btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--accent2); }
    .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--accent2); }
    .btn.secondary {
      background: transparent; border: 2px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.6); box-shadow: none; font-size: 0.72rem;
    }
    .btn.secondary:hover { border-color: white; color: white; transform: none; box-shadow: none; }
    .stat-row { display: flex; gap: 2rem; margin-bottom: 1.5rem; }
    .stat { text-align: center; }
    .stat-label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.15rem; }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: white; line-height: 1; }
    .stat-val.hi { color: var(--accent2); }
    #medal { font-size: 2.2rem; margin-bottom: 0.3rem; }
    .name-input {
      width: 200px; background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.2); color: white;
      padding: 0.6rem 1rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; text-align: center; outline: none; margin-bottom: 1rem;
    }
    .name-input:focus { border-color: var(--accent2); }
    .name-input.shake { animation: shake 0.35s ease; border-color: var(--accent); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .name-input::placeholder { color: rgba(255,255,255,0.25); }
    .tip { font-size: 0.65rem; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; margin-top: 0.6rem; }
    #saving-msg { font-size: 0.7rem; letter-spacing: 0.1em; margin-top: 0.5rem; min-height: 1.2em; }

    /* Leaderboard */
    #leaderboard {
      width: 240px; background: rgba(13,13,30,0.95);
      border: 1px solid rgba(245,200,66,0.25);
      box-shadow: 4px 4px 0 rgba(232,76,43,0.3);
      flex-shrink: 0; max-height: 520px; display: flex; flex-direction: column;
    }
    #lb-header { padding: 1rem 1.2rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
    #lb-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent2); letter-spacing: 0.05em; line-height: 1; }
    #lb-sub { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-top: 0.1rem; }
    #lb-list { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
    #lb-list::-webkit-scrollbar { width: 3px; }
    #lb-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    .lb-row { display: flex; align-items: center; padding: 0.5rem 1.2rem; gap: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .lb-row.me { background: rgba(245,200,66,0.07); }
    .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: rgba(255,255,255,0.2); width: 20px; text-align: center; flex-shrink: 0; }
    .lb-rank.gold { color: #ffd700; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name { flex: 1; font-size: 0.82rem; color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-name.me-name { color: var(--accent2); font-weight: 500; }
    .lb-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: white; flex-shrink: 0; }
    .lb-empty { padding: 1.5rem; font-size: 0.75rem; color: rgba(255,255,255,0.2); text-align: center; }
    #lb-footer { padding: 0.6rem 1.2rem; border-top: 1px solid rgba(255,255,255,0.07); font-size: 0.6rem; color: rgba(255,255,255,0.15); letter-spacing: 0.1em; text-align: center; flex-shrink: 0; }

    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @media (max-width: 640px) {
      #leaderboard { width: 360px; max-width: 98vw; max-height: 280px; }
    }
  </style>
</head>
<body>
<div id="layout">
  <div id="game-wrap">
    <canvas id="c" width="360" height="540"></canvas>
    <div id="ui">
      <div id="score-display">0</div>

      <div class="screen" id="start-screen">
        <div style="font-size:2.8rem;margin-bottom:0.4rem;animation:bob 1s ease-in-out infinite">🐦</div>
        <div class="screen-title">Flakse<br>Fugl</div>
        <div class="screen-sub">Global Leaderboard Edition</div>
        <input class="name-input" id="player-name" type="text" maxlength="16" placeholder="Your name…"/>
        <button class="btn" id="start-btn">Play</button>
        <div class="tip">Må trykke spacebar for å spille</div>
      </div>

      <div class="screen hidden" id="over-screen">
        <div id="medal"></div>
        <div class="screen-title">Game Over</div>
        <div class="stat-row">
          <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="final-score">0</div></div>
          <div class="stat"><div class="stat-label">Your Best</div><div class="stat-val hi" id="best-score">0</div></div>
        </div>
        <button class="btn" id="retry-btn">Try Again</button>
        <button class="btn secondary" id="menu-btn">Menu</button>
        <div id="saving-msg"></div>
      </div>
    </div>
  </div>

  <div id="leaderboard">
    <div id="lb-header">
      <div id="lb-title">Leaderboard</div>
      <div id="lb-sub">Best score per player · Top 10</div>
    </div>
    <div id="lb-list"><div class="lb-empty">Loading…</div></div>
    <div id="lb-footer">floppy-boland · live</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue, query, orderByChild }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyAELM2Q4U7HUX0VbTIxrVZ6m-8HkbItzng",
  authDomain: "floppy-boland.firebaseapp.com",
  projectId: "floppy-boland",
  storageBucket: "floppy-boland.firebasestorage.app",
  messagingSenderId: "872985134661",
  appId: "1:872985134661:web:6e120333bf32e50f2f052c",
  databaseURL: "https://floppy-boland-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);

// ── Key: one record per player name, only their best score is kept ──
// Path: scores/<sanitised_name> = { name, score }
function nameKey(n) {
  // turn "John Doe!" → "john_doe" — safe Firebase key
  return n.trim().toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0, 20);
}

// Submit: only write if this score beats the stored best for that name
async function submitScore(name, score) {
  if (!name || score < 1) return;
  const key = nameKey(name);
  const entryRef = ref(db, 'scores/' + key);
  const snap = await get(entryRef);
  if (!snap.exists() || score > snap.val().score) {
    await set(entryRef, { name: name.trim(), score, ts: Date.now() });
    return true; // new best
  }
  return false; // not a new best
}

const scoresRef = ref(db, 'scores');
onValue(query(scoresRef, orderByChild('score')), snap => {
  const rows = [];
  snap.forEach(child => rows.push(child.val()));
  rows.sort((a, b) => b.score - a.score);
  renderLB(rows.slice(0, 10));
});



function renderLB(rows) {
  const myName = document.getElementById('player-name').value.trim().toLowerCase();
  const list = document.getElementById('lb-list');

  if (!rows.length) {
    list.innerHTML = '<div class="lb-empty">No scores yet —<br>be the first!</div>';
    return;
  }

  list.innerHTML = rows.map((r, i) => {
    const rc = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const me = myName && r.name.toLowerCase() === myName;
    return `<div class="lb-row${me ? ' me' : ''}">
      <div class="lb-rank ${rc}">${i + 1}</div>
      <div class="lb-name${me ? ' me-name' : ''}">${esc(r.name)}</div>
      <div class="lb-score">${r.score}</div>
    </div>`;
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Game ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GH=55, PW=58, GAP=170, GR=0.44, JP=-8.5, PS=3, PINT=1600;

let state='idle', score=0, best=parseInt(localStorage.getItem('fb_best')||'0');
let bird, pipes, stars, lastPipe, lastTime, playerName='';

function makeStars(){ stars=[]; for(let i=0;i<80;i++) stars.push({x:Math.random()*W,y:Math.random()*(H-GH),r:Math.random()*1.4+0.3,a:Math.random()*0.6+0.2}); }
function makeBird(){ return {x:90,y:H/2-30,vy:0,angle:0,flap:0}; }

// function drawBird(b){
//   ctx.save(); ctx.translate(b.x,b.y);
//   ctx.rotate(Math.max(-30,Math.min(70,b.angle))*Math.PI/180);
//   ctx.fillStyle='#f5c842'; ctx.beginPath(); ctx.ellipse(0,0,18,14,0,0,Math.PI*2); ctx.fill();
//   ctx.fillStyle='#e8a820'; ctx.beginPath(); ctx.ellipse(-4,b.flap>5?-10:4,12,7,-0.3,0,Math.PI*2); ctx.fill();
//   ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(10,-5,5,0,Math.PI*2); ctx.fill();
//   ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(11,-5,3,0,Math.PI*2); ctx.fill();
//   ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(12,-6,1.2,0,Math.PI*2); ctx.fill();
//   ctx.fillStyle='#e84c2b'; ctx.beginPath(); ctx.moveTo(16,-2); ctx.lineTo(24,0); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
//   ctx.restore();
// }

const mateImg = new Image();
mateImg.src = 'images/image.jpg'; // match your filename exactly

function drawBird(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  const tilt = Math.max(-30, Math.min(70, b.angle));
  ctx.rotate((tilt * Math.PI) / 180);
  ctx.drawImage(mateImg, -20, -20, 40, 40); // adjust size here
  ctx.restore();
}

function makePipe(x){ return {x, topH:Math.random()*(H-GH-GAP-120)+70, scored:false}; }

function drawPipe(p){
  const cH=22,cap=6,bY=p.topH+GAP,bH=H-GH-bY;
  ctx.fillStyle='#1e4a1e'; ctx.fillRect(p.x+4,2,PW,p.topH-2);
  ctx.fillStyle='#2d6a2d'; ctx.fillRect(p.x,0,PW,p.topH-cH);
  ctx.fillStyle='#3d8a3d'; ctx.fillRect(p.x-cap,p.topH-cH,PW+cap*2,cH);
  ctx.fillStyle='#4caf50'; ctx.fillRect(p.x+4,0,8,p.topH-cH); ctx.fillRect(p.x+4,p.topH-cH,8,cH);
  ctx.fillStyle='#2d6a2d'; ctx.fillRect(p.x,bY+cH,PW,bH-cH);
  ctx.fillStyle='#3d8a3d'; ctx.fillRect(p.x-cap,bY,PW+cap*2,cH);
  ctx.fillStyle='#4caf50'; ctx.fillRect(p.x+4,bY+cH,8,bH-cH); ctx.fillRect(p.x+4,bY,8,cH);
}

function drawGround(){
  ctx.fillStyle='#3a2a10'; ctx.fillRect(0,H-GH,W,GH);
  ctx.fillStyle='#5a4020'; ctx.fillRect(0,H-GH,W,8);
  ctx.fillStyle='#4a8a20';
  for(let x=0;x<W;x+=18) ctx.fillRect(x,H-GH-6,12,7);
}

function drawBg(ts){
  ctx.fillStyle='#0d0d1e'; ctx.fillRect(0,0,W,H-GH);
  for(const s of stars){
    ctx.globalAlpha=s.a*(0.8+0.2*Math.sin(ts/1200+s.x));
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='#fffde0'; ctx.beginPath(); ctx.arc(W-50,50,24,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0d0d1e'; ctx.beginPath(); ctx.arc(W-40,44,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111128';
  [[0,80,48],[48,55,38],[86,95,32],[118,48,52],[170,85,28],[198,65,42],[240,105,48],[288,58,56],[310,80,38]].forEach(([x,h,w])=>{
    ctx.fillRect(x,H-GH-h,w,h);
  });
}

function collides(b){
  if(b.y-12<=0||b.y+12>=H-GH) return true;
  for(const p of pipes){
    if(b.x+14>p.x-6&&b.x-14<p.x+PW+6) if(b.y-10<p.topH||b.y+10>p.topH+GAP) return true;
  }
  return false;
}

function updScore(n){ document.getElementById('score-display').textContent=n; }
function medal(s){ if(s>=40)return'🏆'; if(s>=20)return'🥇'; if(s>=10)return'🥈'; if(s>=5)return'🥉'; return'💀'; }

function reset(){ score=0; bird=makeBird(); pipes=[]; lastPipe=performance.now(); updScore(0); }

function showScreen(id){
  ['start-screen','over-screen'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById('score-display').style.display='none';
  document.getElementById('saving-msg').textContent='';
  if(id) document.getElementById(id).classList.remove('hidden');
  else document.getElementById('score-display').style.display='block';
}

function flap(){
  if(state==='idle'){
    const nameEl=document.getElementById('player-name');
    if(!nameEl.value.trim()){
      nameEl.classList.remove('shake');
      void nameEl.offsetWidth;
      nameEl.classList.add('shake');
      nameEl.focus();
      return;
    }
    playerName=nameEl.value.trim();
    state='playing'; bird.vy=JP; bird.flap=8; showScreen(null); return;
  }
  if(state==='playing'){ bird.vy=JP; bird.flap=8; }
}

async function gameOver(){
  state='dead';
  if(score>best){ best=score; localStorage.setItem('fb_best',best); }
  document.getElementById('final-score').textContent=score;
  document.getElementById('best-score').textContent=best;
  document.getElementById('medal').textContent=medal(score);
  setTimeout(()=>showScreen('over-screen'), 600);

  const msg=document.getElementById('saving-msg');
  if(score>0){
    msg.style.color='rgba(255,255,255,0.3)'; msg.textContent='Saving…';
    try {
      const isNewBest = await submitScore(playerName, score);
      if(isNewBest){
        msg.style.color='rgba(100,220,100,0.8)';
        msg.textContent='New personal best saved! 🎉';
      } else {
        msg.style.color='rgba(255,255,255,0.3)';
        msg.textContent='Score saved (not your best)';
      }
    } catch(e){
      msg.style.color='rgba(255,100,100,0.6)';
      msg.textContent='Could not save score';
    }
  }
}

function loop(ts){
  if(!lastTime) lastTime=ts; lastTime=ts;
  ctx.clearRect(0,0,W,H); drawBg(ts);
  if(state==='playing'){
    if(ts-lastPipe>PINT){ pipes.push(makePipe(W+10)); lastPipe=ts; }
    for(const p of pipes){
      p.x-=PS;
      if(!p.scored&&p.x+PW<bird.x){ p.scored=true; score++; updScore(score); }
    }
    pipes=pipes.filter(p=>p.x>-PW-20);
    bird.vy+=GR; bird.y+=bird.vy; bird.angle=bird.vy*4;
    if(bird.flap>0) bird.flap--;
    if(collides(bird)) gameOver();
  }
  for(const p of pipes) drawPipe(p);
  drawGround();
  if(state==='idle') bird.y=H/2-30+Math.sin(ts/400)*8;
  drawBird(bird);
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();} });
canvas.addEventListener('pointerdown',e=>{ e.preventDefault(); flap(); });
document.getElementById('player-name').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('start-btn').click(); });
document.getElementById('start-btn').addEventListener('click',()=>{ reset(); state='idle'; showScreen('start-screen'); });
document.getElementById('retry-btn').addEventListener('click',()=>{ reset(); state='playing'; bird.vy=JP; bird.flap=8; showScreen(null); });
document.getElementById('menu-btn').addEventListener('click',()=>{ reset(); state='idle'; showScreen('start-screen'); });

makeStars(); reset(); state='idle'; showScreen('start-screen');
requestAnimationFrame(loop);
</script>
</body>
</html>
