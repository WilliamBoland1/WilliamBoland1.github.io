<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Floppy Boland — The Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d0d;
      --paper: #f5f0e8;
      --accent: #e84c2b;
      --accent2: #f5c842;
      --sky: #1a1a2e;
      --sky2: #16213e;
      --ground: #2a1a0a;
      --pipe: #2d6a2d;
      --pipe-hi: #4caf50;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--sky);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #wrapper {
      position: relative;
      width: 420px;
      max-width: 100vw;
    }

    canvas {
      display: block;
      width: 100%;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 1px var(--accent2), 8px 8px 0 var(--accent2);
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #score-display {
      margin-top: 18px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: white;
      text-shadow: 3px 3px 0 var(--accent);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    /* Screens */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,20,0.82);
      padding: 2rem;
      pointer-events: all;
    }

    .screen.hidden { display: none; }

    .screen-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 10vw, 4rem);
      color: var(--accent2);
      text-shadow: 3px 3px 0 var(--accent);
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .screen-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      text-align: center;
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.85rem 2.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 4px 4px 0 var(--accent2);
      margin-bottom: 0.8rem;
      width: 200px;
      text-align: center;
    }

    .btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--accent2); }
    .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--accent2); }

    .btn.secondary {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7);
      box-shadow: none;
      font-size: 0.75rem;
    }
    .btn.secondary:hover { border-color: white; color: white; transform: none; box-shadow: none; }

    .stat-row {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.2rem;
    }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: white;
      line-height: 1;
    }

    .stat-val.highlight { color: var(--accent2); }

    .tip {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      margin-top: 0.8rem;
    }

    .bird-emoji {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: bob 1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    #medal {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
    }
  </style>
</head>
<body>

<div id="wrapper">
  <canvas id="c" width="420" height="600"></canvas>

  <div id="ui">
    <div id="score-display">0</div>

    <!-- Start screen -->
    <div class="screen" id="start-screen">
      <div class="bird-emoji">🐦</div>
      <div class="screen-title">Floppy<br>Boland</div>
      <div class="screen-sub">A game by William</div>
      <button class="btn" id="start-btn">Play</button>
      <div class="tip">Space / Tap to flap</div>
    </div>

    <!-- Game over screen -->
    <div class="screen hidden" id="over-screen">
      <div id="medal"></div>
      <div class="screen-title">Game Over</div>
      <div class="stat-row">
        <div class="stat">
          <div class="stat-label">Score</div>
          <div class="stat-val" id="final-score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Best</div>
          <div class="stat-val highlight" id="best-score">0</div>
        </div>
      </div>
      <button class="btn" id="retry-btn">Try Again</button>
      <button class="btn secondary" id="menu-btn">Menu</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const GROUND_H = 60;
const PIPE_W = 60;
const GAP = 175;
const GRAVITY = 0.45;
const JUMP = -8.5;
const PIPE_SPEED = 3;
const PIPE_INTERVAL = 1600;

let state = 'idle'; // idle | playing | dead
let score = 0, best = parseInt(localStorage.getItem('floppy_best') || '0');
let bird, pipes, stars, lastPipe, frameId, lastTime;

// ── Stars ──
function makeStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (H - GROUND_H),
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.6 + 0.2
    });
  }
}

// ── Bird ──
function makeBird() {
  return { x: 100, y: H / 2 - 30, vy: 0, angle: 0, flap: 0 };
}

const mateImg = new Image();
mateImg.src = 'image.jpg'; // match your filename exactly

function drawBird(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  const tilt = Math.max(-30, Math.min(70, b.angle));
  ctx.rotate((tilt * Math.PI) / 180);
  ctx.drawImage(mateImg, -20, -20, 40, 40); // adjust size here
  ctx.restore();
}

/* // ── Draw bird ──
function drawBird(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  const tilt = Math.max(-30, Math.min(70, b.angle));
  ctx.rotate((tilt * Math.PI) / 180);

  // Body
  ctx.fillStyle = '#f5c842';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing flap
  const wingY = b.flap > 5 ? -10 : 4;
  ctx.fillStyle = '#e8a820';
  ctx.beginPath();
  ctx.ellipse(-4, wingY, 12, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(10, -5, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0d0d0d';
  ctx.beginPath();
  ctx.arc(11, -5, 3, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(12, -6, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#e84c2b';
  ctx.beginPath();
  ctx.moveTo(16, -2);
  ctx.lineTo(24, 0);
  ctx.lineTo(16, 4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}
 */
// ── Pipe ──
function makePipe(x) {
  const minTop = 80;
  const maxTop = H - GROUND_H - GAP - 80;
  const topH = Math.random() * (maxTop - minTop) + minTop;
  return { x, topH, scored: false };
}

function drawPipe(p) {
  const capH = 24, capExtra = 6;

  // Bottom pipe
  const bottomY = p.topH + GAP;
  const bottomH = H - GROUND_H - bottomY;

  // Shadows
  ctx.fillStyle = '#1e4a1e';
  ctx.fillRect(p.x + 4, p.topH + 2, PIPE_W, bottomH - 2);
  ctx.fillRect(p.x + 4, 2, PIPE_W, p.topH - 2);

  // Top pipe body
  ctx.fillStyle = '#2d6a2d';
  ctx.fillRect(p.x, 0, PIPE_W, p.topH - capH);

  // Top pipe cap
  ctx.fillStyle = '#3d8a3d';
  ctx.fillRect(p.x - capExtra, p.topH - capH, PIPE_W + capExtra * 2, capH);

  // Highlight top
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(p.x + 4, 0, 8, p.topH - capH);
  ctx.fillRect(p.x + 4, p.topH - capH, 8, capH);

  // Bottom pipe body
  ctx.fillStyle = '#2d6a2d';
  ctx.fillRect(p.x, bottomY + capH, PIPE_W, bottomH - capH);

  // Bottom pipe cap
  ctx.fillStyle = '#3d8a3d';
  ctx.fillRect(p.x - capExtra, bottomY, PIPE_W + capExtra * 2, capH);

  // Highlight bottom
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(p.x + 4, bottomY + capH, 8, bottomH - capH);
  ctx.fillRect(p.x + 4, bottomY, 8, capH);
}

// ── Ground ──
function drawGround() {
  ctx.fillStyle = '#3a2a10';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

  ctx.fillStyle = '#5a4020';
  ctx.fillRect(0, H - GROUND_H, W, 8);

  // Grass
  ctx.fillStyle = '#4a8a20';
  for (let x = 0; x < W; x += 18) {
    ctx.fillRect(x, H - GROUND_H - 6, 12, 7);
  }

  // Ground texture lines
  ctx.strokeStyle = 'rgba(255,200,100,0.08)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath();
    ctx.moveTo(x, H - GROUND_H + 8);
    ctx.lineTo(x + 20, H - 4);
    ctx.stroke();
  }
}

// ── Background ──
function drawBg() {
  // Sky gradient via rects
  ctx.fillStyle = '#0d0d1e';
  ctx.fillRect(0, 0, W, H - GROUND_H);

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#fffde0';
  ctx.beginPath();
  ctx.arc(W - 60, 55, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0d0d1e';
  ctx.beginPath();
  ctx.arc(W - 50, 50, 24, 0, Math.PI * 2);
  ctx.fill();

  // City silhouette
  ctx.fillStyle = '#111128';
  const buildings = [
    [0, 80, 50, 160], [50, 60, 40, 180], [90, 100, 35, 140],
    [125, 50, 55, 190], [180, 90, 30, 150], [210, 70, 45, 170],
    [255, 110, 50, 130], [305, 60, 60, 180], [365, 85, 40, 155],
    [405, 50, 70, 190], [330, 100, 30, 140]
  ];
  for (const [x, h, w, base] of buildings) {
    ctx.fillRect(x, H - GROUND_H - h, w, h);
    // windows
    ctx.fillStyle = 'rgba(255,230,100,0.15)';
    for (let wy = H - GROUND_H - h + 10; wy < H - GROUND_H - 10; wy += 14) {
      for (let wx = x + 6; wx < x + w - 6; wx += 10) {
        if (Math.random() > 0.4) ctx.fillRect(wx, wy, 6, 8);
      }
    }
    ctx.fillStyle = '#111128';
  }
}

// ── Collision ──
function collides(b) {
  const bx = b.x - 16, by = b.y - 12, bw = 32, bh = 24;
  if (by + bh >= H - GROUND_H) return true;
  if (by <= 0) return true;
  for (const p of pipes) {
    const capExtra = 6;
    if (
      bx < p.x + PIPE_W + capExtra &&
      bx + bw > p.x - capExtra
    ) {
      if (by < p.topH || by + bh > p.topH + GAP) return true;
    }
  }
  return false;
}

// ── Score display ──
function updateScoreDisplay(n) {
  document.getElementById('score-display').textContent = n;
}

// ── Reset ──
function reset() {
  score = 0;
  bird = makeBird();
  pipes = [];
  lastPipe = performance.now();
  updateScoreDisplay(0);
}

// ── Screens ──
function showScreen(id) {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('over-screen').classList.add('hidden');
  document.getElementById('score-display').style.display = 'none';
  if (id) {
    document.getElementById(id).classList.remove('hidden');
  } else {
    document.getElementById('score-display').style.display = 'block';
  }
}

// ── Medal ──
function medal(s) {
  if (s >= 40) return '🏆';
  if (s >= 20) return '🥇';
  if (s >= 10) return '🥈';
  if (s >= 5)  return '🥉';
  return '💀';
}

// ── Game loop ──
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime;
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);
  drawBg();

  if (state === 'playing') {
    // Spawn pipes
    if (ts - lastPipe > PIPE_INTERVAL) {
      pipes.push(makePipe(W + 10));
      lastPipe = ts;
    }

    // Move pipes
    for (const p of pipes) {
      p.x -= PIPE_SPEED;
      if (!p.scored && p.x + PIPE_W < bird.x) {
        p.scored = true;
        score++;
        updateScoreDisplay(score);
      }
    }
    pipes = pipes.filter(p => p.x > -PIPE_W - 20);

    // Bird physics
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.angle = bird.vy * 4;
    if (bird.flap > 0) bird.flap--;

    if (collides(bird)) {
      state = 'dead';
      if (score > best) {
        best = score;
        localStorage.setItem('floppy_best', best);
      }
      document.getElementById('final-score').textContent = score;
      document.getElementById('best-score').textContent = best;
      document.getElementById('medal').textContent = medal(score);
      setTimeout(() => showScreen('over-screen'), 600);
    }
  }

  // Draw pipes
  for (const p of pipes) drawPipe(p);
  drawGround();

  // Draw bird (idle bob when not playing)
  if (state === 'idle') {
    bird.y = H / 2 - 30 + Math.sin(ts / 400) * 8;
  }
  drawBird(bird);

  frameId = requestAnimationFrame(loop);
}

// ── Flap ──
function flap() {
  if (state === 'idle') {
    state = 'playing';
    bird.vy = JUMP;
    bird.flap = 8;
    showScreen(null);
    return;
  }
  if (state === 'playing') {
    bird.vy = JUMP;
    bird.flap = 8;
  }
}

// ── Input ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });

document.getElementById('start-btn').addEventListener('click', () => {
  reset();
  state = 'idle';
  showScreen('start-screen');
});

document.getElementById('retry-btn').addEventListener('click', () => {
  reset();
  state = 'idle';
  bird.vy = JUMP;
  bird.flap = 8;
  state = 'playing';
  showScreen(null);
});

document.getElementById('menu-btn').addEventListener('click', () => {
  reset();
  state = 'idle';
  showScreen('start-screen');
});

// ── Init ──
makeStars();
reset();
state = 'idle';
showScreen('start-screen');
frameId = requestAnimationFrame(loop);
</script>
</body>
</html>
